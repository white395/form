<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗職員資格認証（中級）Ｗｅｂ講習会 受講申込フォーム｜農流研</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: #f4f6f0;
    color: #2c3320;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .page-header .org {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: #6a7a55;
    margin-bottom: 8px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #2c3320;
    margin-bottom: 6px;
  }
  .page-header .subtitle {
    font-size: 13px;
    color: #6a7a55;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: #7a9a50;
    margin: 16px auto 0;
    border-radius: 2px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(44,51,32,0.07);
    margin-bottom: 24px;
    overflow: hidden;
  }

  .card-header {
    background: #2c3320;
    color: #fff;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .badge {
    background: #7a9a50;
    color: #fff;
    border-radius: 4px;
    font-size: 11px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .card-body { padding: 24px; }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #2c3320;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  label .req {
    color: #c0392b;
    margin-left: 4px;
    font-size: 11px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"] {
    width: 100%;
    border: 1.5px solid #d0d8c4;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    color: #2c3320;
    background: #fafcf7;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus {
    border-color: #7a9a50;
    background: #fff;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 480px) {
    .field-row { grid-template-columns: 1fr; }
  }

  /* 受講生カード */
  .student-card {
    border: 1.5px solid #d0d8c4;
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 16px;
    background: #fafcf7;
    position: relative;
  }
  .student-card-header {
    font-size: 13px;
    font-weight: 700;
    color: #6a7a55;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .student-number {
    background: #7a9a50;
    color: #fff;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-right: 8px;
  }

  .btn-remove {
    background: none;
    border: 1.5px solid #d0d8c4;
    border-radius: 4px;
    color: #999;
    font-size: 12px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-remove:hover {
    border-color: #c0392b;
    color: #c0392b;
  }

  .btn-add {
    width: 100%;
    padding: 12px;
    border: 2px dashed #7a9a50;
    border-radius: 8px;
    background: transparent;
    color: #7a9a50;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .btn-add:hover {
    background: #f0f7e8;
  }

  .submit-area { text-align: center; margin-top: 32px; }

  .btn-submit {
    background: #2c3320;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 16px 56px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn-submit:hover { background: #3d4a2a; }
  .btn-submit:active { transform: scale(0.98); }

  .submit-warning {
    font-size: 13px;
    color: #b35c00;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .submit-note {
    font-size: 12px;
    color: #6a7a55;
    margin-top: 12px;
  }

  textarea {
    width: 100%;
    border: 1.5px solid #d0d8c4;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    color: #2c3320;
    background: #fafcf7;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    resize: vertical;
    min-height: 64px;
    line-height: 1.6;
  }
  textarea:focus {
    border-color: #7a9a50;
    background: #fff;
  }

  .info-notice {
    background: #f4f6f0;
    border-left: 3px solid #7a9a50;
    border-radius: 4px;
    padding: 12px 14px;
    margin-top: 20px;
    font-size: 12px;
    color: #4a5a38;
    line-height: 1.8;
  }
  .info-notice p + p { margin-top: 4px; }
</style>
</head>
<body>

<div class="page-header">
  <div class="org">農流研</div>
  <h1>店舗職員資格認証（中級）Ｗｅｂ講習会<br><span style="font-size:18px; font-weight:600; letter-spacing:0.08em;">受講申込フォーム</span></h1>
  <p class="subtitle">※ お申込み後、受付確認メールをお送りします</p>
  <div class="divider"></div>
</div>

<div class="container">

  <form action="https://ssgform.com/s/m5Hg89A4dqz4" method="post" id="mainForm" onsubmit="return validateForm()" autocomplete="off">
    
    <input type="hidden" name="講習会名" value="店舗職員資格認証（中級）Ｗｅｂ講習会">
    
    <input type="hidden" name="受講生一覧" id="hiddenStudents">

    <div class="card">
      <div class="card-header">
        <span>情報A</span>
        <span class="badge">申込担当者</span>
      </div>
      <div class="card-body">
        <div class="field">
          <label>① 団体・法人名 <span class="req">必須</span></label>
          <input type="text" name="団体・法人名" placeholder="例：〇〇農業協同組合" required>
        </div>
        <div class="field">
          <label>② 所属部署・役職</label>
          <input type="text" name="担当者_所属部署・役職" placeholder="例：営農部 営農指導課">
        </div>
        <div class="field">
          <label>  窓口担当者名 <span class="req">必須</span></label>
          <input type="text" name="窓口担当者名" placeholder="例：山田 太郎" required>
        </div>
        <div class="field">
          <label>③ 電話番号 <span class="req">必須</span></label>
          <input type="tel" name="電話番号" placeholder="例：03-0000-0000" required>
        </div>
        <div class="field">
          <label>  メールアドレス <span class="req">必須</span></label>
          <input type="email" name="email" placeholder="例：yamada@example.or.jp" required>
        </div>
        <div class="field">
          <label>④ 請求書に記載する宛名</label>
          <input type="text" name="請求書宛名" placeholder="例：〇〇農業協同組合 御中（省略可）">
        </div>
        <div class="field">
          <label>⑤ 備考（連絡事項などがあればご記入ください）</label>
          <textarea name="備考_連絡事項" placeholder=""></textarea>
        </div>
        
        <div class="info-notice">
          <p>「団体・法人名」「所属部署・役職」は名簿にそのまま使用しますので、正確にご記載ください。</p>
          <p>ご記入いただいた個人情報は、受講者名簿・名札への掲載および講習会運営のために使用します。</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>情報B</span>
        <span class="badge">受講生</span>
      </div>
      <div class="card-body">
        <div id="studentList"></div>
        <button type="button" class="btn-add" onclick="addStudent()">＋ 受講生を追加する</button>
      </div>
    </div>

    <div class="submit-area">
      <p class="submit-warning">⚠️ 入力内容を確認後、送信してください</p>
      <button type="submit" class="btn-submit" id="submitBtn">申込を送信する</button>
      <p class="submit-note">送信後、入力いただいたメールアドレスに受付確認メールをお送りします。</p>
      <p class="submit-note">受付確認メールが届かない場合は、お手数ですが農流研までご連絡ください。</p>
    </div>

  </form>

</div>

<script>
  let studentCount = 0;

  // エンターキーでの誤送信を防止
  document.getElementById("mainForm").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      if (e.target.tagName !== "TEXTAREA") {
        e.preventDefault();
      }
    }
  });

  // 受講生入力欄を追加（生データを直接送らないよう name 属性は削除し、classで管理します）
  function addStudent() {
    studentCount++;
    const div = document.createElement("div");
    div.className = "student-card";
    div.id = "student_" + studentCount;
    
    div.innerHTML = `
      <div class="student-card-header">
        <span><span class="student-number">${studentCount}</span>受講生</span>
        ${studentCount > 1 ? `<button type="button" class="btn-remove" onclick="removeStudent(${studentCount})">削除</button>` : ""}
      </div>
      <div class="field">
        <label>所属部署・役職</label>
        <input type="text" placeholder="例：営農部 営農指導課" class="student-dept-input">
      </div>
      <div class="field-row">
        <div class="field">
          <label>お名前 <span class="req">必須（1人以上）</span></label>
          <input type="text" placeholder="例：農流研 はな子" class="student-name-input">
        </div>
        <div class="field">
          <label>ふりがな</label>
          <input type="text" placeholder="例：のうりゅうけん はなこ" class="student-kana-input">
        </div>
      </div>
      <div class="field">
        <label>その他・備考</label>
        <textarea placeholder="" class="student-note-input"></textarea>
      </div>
    `;
    document.getElementById("studentList").appendChild(div);
    renumberStudents();
  }

  function removeStudent(id) {
    const el = document.getElementById("student_" + id);
    if (el) el.remove();
    renumberStudents();
  }

  document.addEventListener("DOMContentLoaded", function() {
    renumberStudents();
  });

  function renumberStudents() {
    const cards = document.querySelectorAll(".student-card");
    cards.forEach((card, i) => {
      const num = i + 1;
      const badge = card.querySelector(".student-number");
      if (badge) badge.textContent = num;
    });
  }

  // 最初は5人分の入力欄を表示
  for (let i = 0; i < 5; i++) {
    addStudent();
  }

  // 送信直前に全員分のデータを綺麗なテキストにまとめる関数
  function validateForm() {
    const cards = document.querySelectorAll(".student-card");
    let hasAnyName = false;
    let textLines = [];
    let count = 1;
    
    cards.forEach((card) => {
      const dept = card.querySelector(".student-dept-input").value.trim();
      const name = card.querySelector(".student-name-input").value.trim();
      const kana = card.querySelector(".student-kana-input").value.trim();
      const note = card.querySelector(".student-note-input").value.trim();
      
      if (name !== "") {
        hasAnyName = true;
        let line = `【受講生 ${count}】\n・お名前: ${name}`;
        if (kana !== "") line += ` (${kana})`;
        if (dept !== "") line += `\n・所属部署・役職: ${dept}`;
        if (note !== "") line += `\n・備考: ${note}`;
        
        textLines.push(line);
        count++;
      }
    });

    if (!hasAnyName) {
      alert("受講生のお名前を少なくとも1名分入力してください。");
      return false;
    }

    // まとめた文章を隠しフィールドにセット
    document.getElementById("hiddenStudents").value = textLines.join("\n\n");

    // ボタンの二重クリック防止
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("submitBtn").innerText = "送信中...";
    return true;
  }
</script>
</body>
</html>
