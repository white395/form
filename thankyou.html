<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受講申込 受付完了｜農流研</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: #f4f6f0;
    color: #2c3320;
    min-height: 100vh;
    padding: 32px 16px 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container { max-width: 560px; width: 100%; margin: 0 auto; }

  .page-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .page-header .org {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: #6a7a55;
    margin-bottom: 8px;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #2c3320;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: #7a9a50;
    margin: 16px auto 0;
    border-radius: 2px;
  }

  .complete-box {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(44,51,32,0.07);
    padding: 48px 32px;
    text-align: center;
  }

  .complete-box .icon {
    font-size: 56px;
    margin-bottom: 20px;
  }

  .complete-box h2 {
    font-size: 22px;
    font-weight: 700;
    color: #2c3320;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .complete-box p {
    font-size: 14px;
    color: #6a7a55;
    line-height: 1.9;
  }

  .complete-notice {
    background: #fffbe6;
    border: 1.5px solid #f0c040;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 14px;
    font-weight: 600;
    color: #7a6000;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="org">農流研</div>
    <h1>受講申込フォーム</h1>
    <div class="divider"></div>
  </div>

  <div class="complete-box">
    <div class="icon">✅</div>
    <h2>お申込みを受け付けました</h2>
    <p>
      ご入力いただいたメールアドレスに<br>
      受付確認メールをお送りしました。
    </p>
    <div class="complete-notice">
      ※お申込み内容変更等がある場合は、<br>
      別途メールまたはお電話にてお知らせください。
    </div>
    <p>
      ご不明な点がございましたら<br>
      農流研までお問い合わせください。
    </p>
  </div>
</div>
</body>
</html>
